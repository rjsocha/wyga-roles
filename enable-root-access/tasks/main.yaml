- name: "Facts ..."
  include_role:
    name: wyga/minimal-facts

- name: "Set authorized key ..."
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', playbook_dir ~ '/key/user/' ~ user_key) }}"
  become: true
  become_method: "{{ method | default('sudo') }}"
  become_user: root

- name: "Save connected user ..."
  set_fact:
    connected_user: "{{ ansible_ssh_user }}"

- meta: reset_connection

- name: "Remove user ..."
  block:
    - name: "Switch to root ..."
      set_fact:
        ansible_ssh_user: root

    - name: "Remove {{ connected_user }} ..."
      ansible.builtin.user:
        name: "{{ connected_user }}"
        state: absent
        remove: yes
      when: connected_user != "root"
      register: user_purge
      retries: 25
      until: user_purge is success
  when: skip_user_purge is not defined and connected_user != "root"

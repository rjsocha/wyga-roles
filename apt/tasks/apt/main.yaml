---
- name: "APT / Compute configuration ..."
  set_fact:
    apt:
      mirror:          "{{ host.setup.apt.mirror                  | default('pl') }}"
      backports:       "{{ host.setup.apt.sources.backports       | default(false) | bool }}"
      universe:        "{{ host.setup.apt.sources.universe        | default(true)  | bool }}"
      multiverse:      "{{ host.setup.apt.sources.multiverse      | default(false) | bool }}"
      restricted:      "{{ host.setup.apt.sources.restricted      | default(true)  | bool }}"
      contrib:         "{{ host.setup.apt.sources.contrib         | default(true)  | bool }}"
      nonfree:         "{{ host.setup.apt.sources.nonfree         | default(true)  | bool }}"
      nonfreefirmware: "{{ host.setup.apt.sources.nonfreefirmware | default(true)  | bool }}"

- name: "APT / Configure /etc/apt/apt.conf.d/99-host-policy ..."
  template:
    src: "apt/host-policy"
    dest: "/etc/apt/apt.conf.d/99-host-policy"
    group: root
    owner: root
    mode: 0644
  register: apt_host_policy

- name: "APT / Ensure /etc/apt/sources.list.d ..."
  file:
    path: "/etc/apt/sources.list.d"
    state: directory
    mode: 0755

- name: "APT / Configure /etc/apt/sources.list ..."
  template:
    src: "apt/{{ platform.distribution }}/{{ platform.version }}/sources.list"
    dest: "/etc/apt/sources.list"
    group: root
    owner: root
    mode: 0644
  register: apt_sources_list

- name: "APT / Check for deb822 sources template ..."
  stat:
    path: "{{ role_path }}/templates/apt/{{ platform.distribution }}/{{ platform.version }}/{{ platform.distribution }}.sources"
  delegate_to: localhost
  become: false
  register: apt_deb822_template

- name: "APT / Configure /etc/apt/sources.list.d/{{ platform.distribution }}.sources ..."
  template:
    src: "apt/{{ platform.distribution }}/{{ platform.version }}/{{ platform.distribution }}.sources"
    dest: "/etc/apt/sources.list.d/{{ platform.distribution }}.sources"
    group: root
    owner: root
    mode: 0644
  register: apt_sources_deb822
  when: apt_deb822_template.stat.exists

- name: "APT / Cleanup legacy sources backups ..."
  file:
    path: "/etc/apt/{{ item }}"
    state: absent
  loop:
    - sources.list~
    - sources.list.bak
    - sources.list.curtin.orig

- name: "APT / Cleanup apt cache after sources change ..."
  shell: "find /var/lib/apt/lists /var/cache/apt -type f -delete && apt-get clean"
  when: apt_host_policy.changed or apt_sources_list.changed or (apt_sources_deb822.changed | default(false))

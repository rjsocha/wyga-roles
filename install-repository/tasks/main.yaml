- name: "Check required vars ..."
  fail:
    msg: "Missing repository_name variable ..."
  when: repository_name is not defined

- name: "System detection ..."
  block:
    - name: "Collect host information ..."
      ansible.builtin.setup:
        gather_subset:
          - 'min'
          - 'network'
          - 'mounts'
    - name: "Configuration ..."
      set_fact:
        target_distribution: "{{ ansible_distribution | lower }}"
        target_distribution_version: "{{ ansible_distribution_version }}"
  when: target_distribution is not defined or target_distribution_version is not defined

- name: "Install repository ..."
  include_tasks: "repository/{{ target_distribution }}/{{ target_distribution_version }}/{{ repository_name }}.yml"

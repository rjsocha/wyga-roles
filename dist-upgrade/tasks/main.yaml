---
# Hackish
- name: Run one-kernel-only if present
  ansible.builtin.shell: command -v one-kernel-only >/dev/null && one-kernel-only --purge || true
  changed_when: false

- name: apt-get dist-upgrade
  apt:
    upgrade: dist
    autoremove: yes
    purge: yes
    autoclean: yes
    force_apt_get: yes
    update_cache: yes
  register: _action
  retries: 25
  until: _action is success or ('Failed to lock apt for exclusive operation' not in _action.msg and '/var/lib/dpkg/lock' not in _action.msg)

- name: apt-get autoremove
  apt:
    autoremove: yes
    purge: yes
    force_apt_get: yes
  register: _action
  retries: 25
  until: _action is success or ('Failed to lock apt for exclusive operation' not in _action.msg and '/var/lib/dpkg/lock' not in _action.msg)
